apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: devops-challenge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: app1
        # Em um cenário real, aqui seria a URL do seu registry, ex: xxx.dkr.ecr.sa-east-1.amazonaws.com/app1:latest
        image: app1:latest 
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: app1-service
  namespace: devops-challenge
spec:
  selector:
    app: app1
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000