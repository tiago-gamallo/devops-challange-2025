services:

  app1:
    build: ./app1-python
    container_name: app1
    restart: unless-stopped
    expose:
      - "5000"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  app2:
    build: ./app2-node
    container_name: app2
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - tmpfs_cache:/var/cache/nginx
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    networks:
      - backend
      - frontend

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000" 
    networks:
      - backend
      - frontend

networks:
  backend:
  frontend:

volumes:
  tmpfs_cache:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs